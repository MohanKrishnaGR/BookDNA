name: release

# Continuous delivery: on a version tag (or manual dispatch), build a signed,
# obfuscated Android App Bundle and deliver it to the Google Play *internal*
# testing track. Promotion to production stays MANUAL (staged rollout in Play
# Console) — this pipeline never touches the production track.
#
# Inactive until the repo secrets below are configured (see docs/CICD.md):
#   ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS,
#   ANDROID_KEY_PASSWORD, GOOGLE_SERVICES_JSON_BASE64, ENV_JSON,
#   PLAY_SERVICE_ACCOUNT_JSON

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-deliver:
    name: Build signed AAB & deliver to Play internal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Materialize secrets into build files
        env:
          ENV_JSON: ${{ secrets.ENV_JSON }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "$ENV_JSON" > env.json
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storeFile=upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - run: flutter pub get

      - name: Build app bundle (signed, obfuscated)
        # github.run_number guarantees a strictly-increasing versionCode so Play
        # never rejects the upload. versionName comes from pubspec.yaml.
        run: >
          flutter build appbundle --release
          --dart-define-from-file=env.json
          --obfuscate --split-debug-info=build/symbols
          --build-number=${{ github.run_number }}

      - name: Attach AAB to a GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/bundle/release/app-release.aab
          fail_on_unmatched_files: true

      - name: Keep Dart obfuscation symbols (for Crashlytics symbolication)
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: build/symbols
          if-no-files-found: warn

      - name: Deliver to Play internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.bookdna.bookdna
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
