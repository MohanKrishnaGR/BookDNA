name: ci

# Continuous integration: lint + tests on every PR and every push to main.
# No secrets required — `flutter analyze` and `flutter test` run without env.json
# (String.fromEnvironment defaults are graceful) and generated code is committed.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-test:
    name: Analyze & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test (with coverage)
        run: flutter test --coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: warn

  build-debug:
    name: Debug build (compile check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true
      - run: flutter pub get
      # Catches Gradle/Kotlin breakage that analyze/test can't see. No secrets:
      # Firebase plugins skip cleanly when google-services.json is absent.
      - name: Debug build
        run: flutter build apk --debug
